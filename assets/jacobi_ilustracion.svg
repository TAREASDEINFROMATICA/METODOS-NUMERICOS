<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
<rect width="1200" height="650" fill="#f8fafc"/>
<text x="60" y="80" font-size="38" font-family="Arial" fill="#0f172a" font-weight="700">Método de Jacobi</text>
<text x="60" y="120" font-size="22" font-family="Arial" fill="#475569">Todas las variables se actualizan usando solo la iteración anterior</text>
<circle cx="220" cy="340" r="90" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
<circle cx="600" cy="340" r="90" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
<circle cx="980" cy="340" r="90" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
<text x="170" y="350" font-size="38" font-family="Arial" fill="#1d4ed8" font-weight="700">x⁽ᵏ⁾</text>
<text x="540" y="350" font-size="38" font-family="Arial" fill="#1d4ed8" font-weight="700">x⁽ᵏ+1⁾</text>
<text x="935" y="350" font-size="38" font-family="Arial" fill="#1d4ed8" font-weight="700">Convergencia</text>
<path d="M310 340 C390 280, 430 280, 510 340" stroke="#38bdf8" stroke-width="8" fill="none"/>
<polygon points="496,325 520,340 496,355" fill="#38bdf8"/>
<path d="M690 340 C770 280, 810 280, 890 340" stroke="#38bdf8" stroke-width="8" fill="none"/>
<polygon points="876,325 900,340 876,355" fill="#38bdf8"/>
<text x="110" y="550" font-size="26" font-family="Arial" fill="#334155">Actualización simultánea</text>
<text x="470" y="550" font-size="26" font-family="Arial" fill="#334155">No usa valores recién calculados</text>
<text x="860" y="550" font-size="26" font-family="Arial" fill="#334155">Puede ser más lento</text>
</svg>